<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zvooq | Войти</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Zvooq</div>
      <div class="auth-subtitle">Ваша музыка, всегда с вами</div>

      
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">Имя пользователя</label>
          <input type="text" class="form-input" id="login-username" placeholder="username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" id="login-btn">Войти</button>
        <p class="auth-switch">Нет аккаунта? <a href="#" id="to-register">Зарегистрироваться</a></p>
      </div>

      
      <div id="register-form" class="is-hidden">
        <div class="form-group">
          <label class="form-label">Имя пользователя</label>
          <input type="text" class="form-input" id="reg-username" placeholder="username">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" class="form-input" id="reg-password" placeholder="Минимум 6 символов">
        </div>
        <div class="form-group">
          <label class="form-label">Повторите пароль</label>
          <input type="password" class="form-input" id="reg-password2" placeholder="Повторите пароль">
        </div>
        <button class="btn btn-primary btn-full" id="register-btn">Зарегистрироваться</button>
        <p class="auth-switch">Уже есть аккаунт? <a href="#" id="to-login">Войти</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
